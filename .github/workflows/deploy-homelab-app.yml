name: Deploy Homelab App

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Admitted homelab app key"
        required: true
        type: string
      channel:
        description: "Deploy channel"
        required: true
        type: string
      target:
        description: "Release identifier to deploy, for example deopjib-v0.0.1"
        required: true
        type: string

permissions: {}

concurrency:
  group: deploy-homelab-app-${{ inputs.app }}-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - homelab
    environment: ${{ inputs.channel == 'prod' && 'homelab-prod' || 'homelab-dev' }}
    steps:
      - name: Deploy
        run: |
          set -euo pipefail
          appctl=/run/current-system/sw/bin/homelab-appctl
          sudo=/run/wrappers/bin/sudo
          "$sudo" -n "$appctl" deploy "$APP" "$CHANNEL" --target "$TARGET"
        env:
          APP: ${{ inputs.app }}
          CHANNEL: ${{ inputs.channel }}
          TARGET: ${{ inputs.target }}
