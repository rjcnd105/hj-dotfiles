[tasks.mise-completion]
run = """
  mise completion fish > ~/.config/fish/completions/mise.fish
  chmod +x ~/.config/fish/completions/mise.fish

  jj util completion fish > ~/.config/fish/completions/jj.fish
  jj config set --user user.name "hj"
  jj config set --user user.email "rjcnd123@gmail.com"
  jj config set --user user.editor "cursor"
"""


[tasks.chrome-debug]
run = '''
/Applications/Google\ Chrome\ Canary.app/Contents/MacOS/Google\ Chrome\ Canary --remote-debugging-port=9222 --user-data-dir=/tmp/chrome-debug
'''

[tasks.jj-desc]
description = "AI로 jj commit description 자동 작성 (Gemini CLI)"
run = '''
#!/usr/bin/env bash
set -euo pipefail

STAT=$(jj diff --stat)
if [ -z "$STAT" ]; then echo "변경사항이 없습니다"; exit 1; fi

PROMPT_FILE="${XDG_CONFIG_HOME:-$HOME/.config}/jj/commit-prompt.txt"
PROMPT=$(cat "$PROMPT_FILE")

MSG=$({ echo "[변경 파일]"; echo "$STAT"; echo; echo "[Diff (삭제 전용 파일 제외)]"; jj diff --git | awk '/^diff --git/{header=$0; deleted=0} /^deleted file mode/{deleted=1} {if(!deleted) print}' | head -c 3000; } | gemini -p "$PROMPT" --allowed-mcp-server-names="[]" --extensions="[]" -m flash-lite -o text 2>/dev/null || true)

if [ -z "$MSG" ]; then echo "API 응답 실패"; exit 1; fi

jj desc -m "$MSG"
echo "✓ $MSG"
'''

# claude native 설치를 위함
[tasks.install-claude]
description = "Claude Code CLI 네이티브 스크립트로 설치"
run = "curl -fsSL https://claude.ai/install.sh | bash"

[env]
_.path = [
  "$XDG_BIN_HOME",
  "$HOME/.cache/.bun/bin",
  "$HOME/.local/scripts"
]
SKILLIB = "$HOME/.local/agents/skills"
