<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anchor Tooltip Popover</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: #161b22;
      background: #eef2f6;
    }

    .settings-card {
      width: min(100%, 460px);
      display: grid;
      gap: 18px;
      border-radius: 8px;
      padding: 20px;
      background: #ffffff;
      box-shadow: 0 14px 42px rgba(22, 27, 34, 0.14);
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
      line-height: 1.2;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
    }

    select {
      width: 100%;
      border: 1px solid #cbd6df;
      border-radius: 8px;
      padding: 10px 12px;
      color: #161b22;
      background: #f8fafc;
      font: inherit;
    }

    .help {
      anchor-name: --help-trigger;
      width: 28px;
      aspect-ratio: 1;
      border: 0;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font: 800 0.85rem/1 Inter, ui-sans-serif, system-ui, sans-serif;
      color: white;
      background: #2d5f73;
      cursor: pointer;
    }

    .help:focus-visible {
      outline: 3px solid #8ad7ee;
      outline-offset: 3px;
    }

    [popover] {
      inset: auto;
      margin: 0;
      max-width: min(320px, calc(100vw - 32px));
      border: 0;
      border-radius: 8px;
      padding: 12px 14px;
      color: #ffffff;
      background: #1f2933;
      box-shadow: 0 16px 38px rgba(31, 41, 51, 0.24);
      transform: translateY(12px);
    }

    @supports (anchor-name: --x) {
      [popover] {
        position-anchor: --help-trigger;
        position-area: top;
        justify-self: anchor-center;
        margin-block-end: 10px;
        transform: none;
      }

      @position-try --below {
        position-area: bottom;
        margin-block-start: 10px;
        margin-block-end: 0;
      }

      [popover] {
        position-try-fallbacks: --below;
      }
    }

    p {
      margin: 0;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main class="settings-card" aria-label="Anchor tooltip demo">
    <h1>Export settings</h1>
    <div class="field">
      <label for="format">
        File format
        <button class="help" popovertarget="hint" aria-label="Show format guidance">?</button>
      </label>
      <select id="format">
        <option>CSV for spreadsheets</option>
        <option>JSON for API import</option>
        <option>PDF for review</option>
      </select>
    </div>
  </main>

  <div id="hint" popover>
    <p>Use JSON when another system imports the export. Anchor positioning keeps this native popover attached to the help button.</p>
  </div>
</body>
</html>
