<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Previous Sibling With :has</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: #1c2430;
      background: #eef2f4;
    }

    ol {
      width: min(100%, 420px);
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
      counter-reset: step;
    }

    li {
      counter-increment: step;
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 12px;
      align-items: center;
      border: 1px solid #d7e0e7;
      border-radius: 8px;
      padding: 12px;
      background: #ffffff;
    }

    li::before {
      content: counter(step);
      width: 36px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #52606d;
      background: #edf2f7;
      font-weight: 800;
    }

    .current {
      border-color: #2f6f7e;
      box-shadow: 0 10px 28px rgba(47, 111, 126, 0.16);
    }

    .current::before {
      color: #ffffff;
      background: #2f6f7e;
    }

    @supports selector(li:has(+ li)) {
      li:has(+ .current) {
        border-color: #8bbf9f;
        background: #f0f8f3;
      }

      li:has(+ .current)::before {
        content: "✓";
        color: #ffffff;
        background: #3f8f58;
      }
    }

    strong {
      display: block;
      margin-bottom: 2px;
    }

    span {
      color: #5b6773;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main aria-label="Previous sibling relational selector demo">
    <ol>
      <li><div><strong>Draft</strong><span>Base state with no extra selector dependency.</span></div></li>
      <li><div><strong>Review</strong><span>This item is styled because it has the current step next to it.</span></div></li>
      <li class="current"><div><strong>Ship</strong><span>The fallback still highlights the current step directly.</span></div></li>
      <li><div><strong>Archive</strong><span>Future steps stay neutral.</span></div></li>
    </ol>
  </main>
</body>
</html>
