<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Layered Shadow Border</title>
  <style>
    @layer reset, demo;

    @layer reset {
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        color: #15171a;
        background: #e9edf0;
      }
    }

    @layer demo {
      main {
        display: grid;
        min-height: 100svh;
        place-items: center;
        padding: 24px;
      }

      article {
        width: min(100%, 420px);
        border-radius: 8px;
        background: #fbfcfd;
        padding: 28px;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.95),
          inset 0 -1px 0 rgba(16, 24, 40, 0.08),
          0 1px 2px rgba(16, 24, 40, 0.08),
          0 18px 44px rgba(16, 24, 40, 0.16);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      article:hover {
        transform: translateY(-2px);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.98),
          inset 0 -1px 0 rgba(16, 24, 40, 0.1),
          0 4px 10px rgba(16, 24, 40, 0.1),
          0 24px 60px rgba(16, 24, 40, 0.18);
      }

      @supports (color: color-mix(in oklab, white, black)) {
        article {
          box-shadow:
            inset 0 0 0 1px color-mix(in oklab, white 92%, transparent),
            inset 0 -1px 0 color-mix(in oklab, #111827 12%, transparent),
            0 1px 2px color-mix(in oklab, #111827 8%, transparent),
            0 18px 44px color-mix(in oklab, #111827 17%, transparent);
        }
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.35rem;
        line-height: 1.15;
      }

      p {
        margin: 0;
        max-width: 54ch;
        color: #4a5563;
        line-height: 1.55;
      }
    }
  </style>
</head>
<body>
  <main>
    <article>
      <h1>Layered shadow border</h1>
      <p>A crisp inset edge, a quiet lower divider, and a soft outer lift are composed with shadows, so the layout size never changes.</p>
    </article>
  </main>
</body>
</html>
