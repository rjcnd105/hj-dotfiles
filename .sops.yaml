keys:
  - &hj_age age14c6z2hf8qr9lumph8smjh7yny25nd7v4xy9guc8n5r2pfrmhjfasrjmhz5
  # homelab age key — 설치 후 ssh-to-age로 생성하여 교체
  # - &homelab_age age1...

creation_rules:
  # 공통 secrets (모든 사용자가 접근)
  - path_regex: secrets/shared/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          # - *admin_age
          - *hj_age

  # workspace/hj 전용 secrets
  - path_regex: secrets/workspace/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *hj_age

  # homelab/hj secrets — homelab age key 생성 후 활성화
  - path_regex: secrets/homelab/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *hj_age
          # - *homelab_age
